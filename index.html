<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Chatbot TI</title>

<style>
  body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: white;
    margin: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  .chat-container {
    width: 400px;
    height: 600px;
    background: #020617;
    border-radius: 16px;
    display: flex;
    flex-direction: column;
    box-shadow: 0 0 30px rgba(0,0,0,0.5);
  }

  .header {
    padding: 15px;
    background: #0ea5e9;
    border-radius: 16px 16px 0 0;
    text-align: center;
    font-weight: bold;
  }

  .chat-box {
    flex: 1;
    padding: 10px;
    overflow-y: auto;
  }

  .msg {
    margin: 10px 0;
    padding: 10px;
    border-radius: 10px;
    max-width: 80%;
  }

  .user {
    background: #22c55e;
    align-self: flex-end;
  }

  .bot {
    background: #334155;
    align-self: flex-start;
  }

  .input-area {
    display: flex;
    padding: 10px;
    border-top: 1px solid #1e293b;
  }

  input {
    flex: 1;
    padding: 10px;
    border-radius: 10px;
    border: none;
    outline: none;
  }

  button {
    margin-left: 10px;
    padding: 10px 15px;
    border: none;
    border-radius: 10px;
    background: #0ea5e9;
    color: white;
    cursor: pointer;
  }

  button:hover {
    background: #0284c7;
  }
</style>
</head>

<body>

<div class="chat-container">
  <div class="header">🤖 Chatbot TI</div>

  <div id="chat" class="chat-box"></div>

  <div class="input-area">
    <input id="pergunta" placeholder="Digite sua pergunta...">
    <button onclick="enviar()">Enviar</button>
  </div>
</div>

<script>
  const chat = document.getElementById("chat");

  function adicionarMensagem(texto, tipo) {
    const div = document.createElement("div");
    div.classList.add("msg", tipo);
    div.innerText = texto;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }

  async function enviar() {
    const input = document.getElementById("pergunta");
    const pergunta = input.value;

    if (!pergunta) return;

    adicionarMensagem(pergunta, "user");
    input.value = "";

    adicionarMensagem("Pensando...", "bot");

    const response = await fetch("/api/chat", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ pergunta })
    });

    const data = await response.json();

    // remove "Pensando..."
    chat.lastChild.remove();

    adicionarMensagem(data.resposta, "bot");
  }

  // Enter para enviar
  document.getElementById("pergunta").addEventListener("keypress", function(e) {
    if (e.key === "Enter") enviar();
  });
</script>

</body>
</html>
